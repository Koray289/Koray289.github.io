<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Design</title>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        /* New Footer Styles */
        .custom-footer {
            background-color: #ff6600;
            /* Turuncu */
            color: #ffffff;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 1000;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 500;
        }

        .footer-item i {
            font-size: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer-item span {
            display: block;
        }

        @media (max-width: 768px) {
            .custom-footer {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .footer-item {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div style="height: 500px; background: #f0f0f0; display: flex; align-items: center; justify-content: center;">
        <p>Sayfa İçeriği...</p>
    </div>

    <!-- Footer Template -->
    <div class="custom-footer">
        <div class="footer-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>Adres Bilgisi Buraya</span>
        </div>
        <div class="footer-item">
            <i class="fas fa-phone-alt"></i>
            <span>0544 285 98 99</span>
        </div>
        <div class="footer-item">
            <i class="fas fa-envelope"></i>
            <span>info@educentro.com</span>
        </div>
        <div class="footer-item">
            <i class="fab fa-instagram"></i>
            <span>educentro</span>
        </div>
    </div>

</body>

</html>
